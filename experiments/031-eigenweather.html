<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>031 — eigenweather</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #03050a; color: #d9e6f2; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    canvas { display: block; }
    #caption { position: fixed; left: 18px; bottom: 16px; max-width: min(780px, calc(100vw - 36px)); color: rgba(217,230,242,0.76); font-size: 12px; line-height: 1.45; letter-spacing: 0.02em; text-shadow: 0 1px 16px rgba(0,0,0,0.72); }
    #caption b { color: rgba(246,250,255,0.96); font-weight: 500; }
  </style>
</head>
<body>
  <div id="caption"><b>eigenweather</b> · a lattice repeatedly averages its neighbors, but the remaining error is allowed to become weather. click to change the boundary oath.</div>
  <script>
    const oaths = [
      { name: 'left rain', ax: 0.61, ay: 0.19, hue: 192 },
      { name: 'diagonal frost', ax: 0.37, ay: 0.73, hue: 225 },
      { name: 'prime heat', ax: 0.53, ay: 0.41, hue: 32 },
      { name: 'blue remainder', ax: 0.29, ay: 0.67, hue: 266 }
    ];

    let cols, rows, cell, field, nextField, residues, particles, caption;
    let oath = 0, tick = 0, residualMass = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(Math.min(2, window.devicePixelRatio || 1));
      colorMode(HSB, 360, 100, 100, 1);
      caption = document.getElementById('caption');
      rebuild();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      rebuild();
    }

    function mousePressed() {
      oath = (oath + 1) % oaths.length;
      tick += 211;
      rebuild();
    }

    function rebuild() {
      cell = Math.max(8, Math.min(16, Math.floor(Math.sqrt(width * height) / 95)));
      cols = Math.ceil(width / cell);
      rows = Math.ceil(height / cell);
      field = new Float32Array(cols * rows);
      nextField = new Float32Array(cols * rows);
      residues = new Float32Array(cols * rows);
      const o = oaths[oath];
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = x + y * cols;
          const wave = Math.sin((x + tick) * o.ax * 0.19) + Math.cos((y - tick) * o.ay * 0.23);
          const bit = (((x * 17 + y * 31 + tick) % 97) < 23) ? 0.55 : -0.35;
          field[i] = wave * 0.42 + bit;
          residues[i] = 0;
        }
      }
      particles = [];
      for (let i = 0; i < 420; i++) particles.push(seedParticle(i));
      residualMass = 0;
      updateCaption();
      background(224, 55, 3);
    }

    function draw() {
      const o = oaths[oath];
      background(224, 55, 3, 0.22);
      relax(o);
      renderField(o);
      renderParticles(o);
      renderBoundary(o);
      if (frameCount % 60 === 0) updateCaption();
    }

    function relax(o) {
      residualMass = 0;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = x + y * cols;
          const boundary = boundaryValue(x, y, o);
          const north = field[x + ((y + rows - 1) % rows) * cols];
          const south = field[x + ((y + 1) % rows) * cols];
          const west = field[((x + cols - 1) % cols) + y * cols];
          const east = field[((x + 1) % cols) + y * cols];
          const laplaceGuess = (north + south + west + east) * 0.25;
          const old = field[i];
          const injection = boundary * (edgeWeight(x, y) * 0.05);
          const revised = lerp(old, laplaceGuess + injection, 0.31);
          const error = old - laplaceGuess;
          residues[i] = residues[i] * 0.965 + Math.abs(error) * 0.072;
          nextField[i] = revised + Math.sin((x * 5 + y * 7 + frameCount) * 0.021) * residues[i] * 0.006;
          residualMass += residues[i];
        }
      }
      const swap = field; field = nextField; nextField = swap;
    }

    function renderField(o) {
      noStroke();
      const maxMass = Math.max(1, residualMass / (cols * rows));
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = x + y * cols;
          const v = field[i];
          const r = constrain(residues[i] / (maxMass * 3.2), 0, 1);
          const h = (o.hue + v * 34 + r * 72 + 360) % 360;
          const bright = 8 + Math.pow(r, 0.62) * 74 + Math.max(0, v) * 10;
          fill(h, 40 + r * 52, bright, 0.13 + r * 0.54);
          const inset = cell * (0.08 + (1 - r) * 0.24);
          rect(x * cell + inset, y * cell + inset, cell - inset * 2, cell - inset * 2, cell * 0.22);
        }
      }
    }

    function renderParticles(o) {
      blendMode(ADD);
      for (const p of particles) {
        const x = Math.floor(constrain(p.x, 0, cols - 1));
        const y = Math.floor(constrain(p.y, 0, rows - 1));
        const i = x + y * cols;
        const gx = field[((x + 1) % cols) + y * cols] - field[((x + cols - 1) % cols) + y * cols];
        const gy = field[x + ((y + 1) % rows) * cols] - field[x + ((y + rows - 1) % rows) * cols];
        const px = p.x * cell + cell * 0.5;
        const py = p.y * cell + cell * 0.5;
        p.vx = p.vx * 0.86 + gx * 0.92 + Math.sin((frameCount + p.seed) * 0.017) * 0.015;
        p.vy = p.vy * 0.86 + gy * 0.92 + Math.cos((frameCount + p.seed) * 0.013) * 0.015;
        p.x = (p.x + p.vx + cols) % cols;
        p.y = (p.y + p.vy + rows) % rows;
        const q = constrain(residues[i] * 4.5, 0, 1);
        stroke((o.hue + 148 + p.seed % 61) % 360, 36 + q * 45, 88, 0.10 + q * 0.34);
        strokeWeight(0.55 + q * 1.6);
        line(px, py, p.x * cell + cell * 0.5, p.y * cell + cell * 0.5);
      }
      blendMode(BLEND);
    }

    function renderBoundary(o) {
      noFill();
      strokeWeight(1);
      for (let k = 0; k < 12; k++) {
        const t = (frameCount * 0.003 + k / 12) % 1;
        stroke((o.hue + 90 + k * 6) % 360, 55, 82, 0.06);
        rect(width * t - width * 0.5, height * (0.08 + 0.84 * fract(t * o.ay + 0.2)), width * 0.9, height * 0.18, 28);
      }
    }

    function seedParticle(i) {
      const o = oaths[oath];
      return {
        x: fract((i + 1) * o.ax + tick * 0.001) * cols,
        y: fract((i + 1) * o.ay + tick * 0.002) * rows,
        vx: 0,
        vy: 0,
        seed: i * 37 + tick
      };
    }

    function boundaryValue(x, y, o) {
      const a = Math.sin((x + tick) * o.ax * 0.071 + frameCount * 0.011);
      const b = Math.cos((y - tick) * o.ay * 0.083 - frameCount * 0.009);
      const c = (((x + 1) * (y + 3) + tick) % 89) / 89 - 0.5;
      return a * 0.56 + b * 0.38 + c * 0.33;
    }

    function edgeWeight(x, y) {
      const dx = Math.min(x, cols - 1 - x) / Math.max(1, cols * 0.5);
      const dy = Math.min(y, rows - 1 - y) / Math.max(1, rows * 0.5);
      return Math.pow(1 - Math.min(dx, dy), 2.5);
    }

    function updateCaption() {
      const avg = cols && rows ? (residualMass / (cols * rows)).toFixed(4) : '0.0000';
      caption.innerHTML = `<b>eigenweather</b> · ${oaths[oath].name}; residual mass ${avg}. the grid tries to become its own average, but each failed convergence condenses into moving weather. click to rotate the boundary oath.`;
    }

    function fract(n) { return n - Math.floor(n); }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>witness knots</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #05070a; color: #dfe6d1; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    canvas { display: block; }
    #caption { position: fixed; left: 18px; bottom: 16px; max-width: 790px; color: rgba(224,233,210,.78); font-size: 12px; line-height: 1.45; letter-spacing: .02em; text-shadow: 0 1px 12px #000; }
    #caption b { color: #f2dc8d; font-weight: 500; }
  </style>
</head>
<body>
  <div id="caption"><b>witness knots</b> — thirty-one residues walk a torus. a crossing is not enough: only paths that can name the same remainder are allowed to leave a knot.</div>
  <script>
    const MOD = 31;
    const WALKERS = 31;
    const MEMORY = 0.965;
    const KNOT_LIMIT = 900;
    let walkers = [];
    let knots = [];
    let t = 0;
    let caption;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(Math.min(2, window.devicePixelRatio || 1));
      caption = document.getElementById('caption');
      colorMode(HSB, 360, 100, 100, 1);
      randomSeed(23031);
      noiseSeed(23031);
      resetWalkers();
      background(5, 7, 10);
      frameRate(30);
    }

    function resetWalkers() {
      walkers = [];
      knots = [];
      const r = Math.min(width, height) * 0.33;
      for (let i = 0; i < WALKERS; i++) {
        const a = TWO_PI * i / WALKERS;
        walkers.push({
          residue: i,
          x: width * 0.5 + Math.cos(a) * r,
          y: height * 0.5 + Math.sin(a) * r,
          px: width * 0.5 + Math.cos(a) * r,
          py: height * 0.5 + Math.sin(a) * r,
          phase: random(TAU),
          debt: 0
        });
      }
      t = 0;
    }

    function draw() {
      noStroke();
      fill(205, 80, 4, 1 - MEMORY);
      rect(0, 0, width, height);

      const cx = width * 0.5;
      const cy = height * 0.5;
      for (const w of walkers) {
        w.px = w.x;
        w.py = w.y;
        const witness = (w.residue * w.residue + t + Math.floor(w.debt)) % MOD;
        const spin = noise(w.residue * 0.23, t * 0.011) - 0.5;
        const pull = Math.atan2(cy - w.y, cx - w.x) * 0.018;
        const theta = w.phase + witness * TAU / MOD + spin * 1.7 + pull;
        const stride = 1.8 + (witness % 7) * 0.42;
        w.x = wrap(w.x + Math.cos(theta) * stride, width);
        w.y = wrap(w.y + Math.sin(theta) * stride, height);
        w.phase += 0.013 + ((w.residue + t) % 5) * 0.002;
        w.debt = (w.debt * 0.94 + witness) % MOD;
      }

      strokeWeight(1.15);
      blendMode(ADD);
      for (const w of walkers) {
        const hue = (w.residue * 137.5 + t * 0.2) % 360;
        stroke(hue, 55, 58, 0.18);
        if (distWrapped(w.px, w.py, w.x, w.y) < width * 0.25) line(w.px, w.py, w.x, w.y);
      }

      for (let i = 0; i < walkers.length; i++) {
        for (let j = i + 1; j < walkers.length; j++) {
          const a = walkers[i], b = walkers[j];
          const d = distWrapped(a.x, a.y, b.x, b.y);
          const oath = (a.residue * (j + 1) + b.residue * (i + 1) + t) % MOD;
          if (d < 11 && oath === ((a.residue + b.residue) % MOD)) {
            knots.push({ x: (a.x + b.x) * 0.5, y: (a.y + b.y) * 0.5, r: (oath % 9) + 4, life: 1, hue: (oath * 41 + t) % 360 });
          }
        }
      }
      if (knots.length > KNOT_LIMIT) knots.splice(0, knots.length - KNOT_LIMIT);

      noFill();
      for (const k of knots) {
        stroke(k.hue, 72, 92, k.life * 0.42);
        strokeWeight(0.6 + k.life * 1.7);
        ellipse(k.x, k.y, k.r * (2 - k.life), k.r * (1.1 + k.life));
        k.life *= 0.992;
      }
      knots = knots.filter(k => k.life > 0.035);
      blendMode(BLEND);

      if (t % 20 === 0) {
        const totalDebt = walkers.reduce((s, w) => s + w.debt, 0) / walkers.length;
        caption.innerHTML = `<b>witness knots</b> — ${WALKERS} residues walking mod ${MOD}; ${knots.length} named crossings retained; average arithmetic debt ${nf(totalDebt, 1, 2)}.`;
      }
      t++;
    }

    function wrap(v, max) {
      v %= max;
      return v < 0 ? v + max : v;
    }

    function distWrapped(x1, y1, x2, y2) {
      const dx = Math.min(Math.abs(x1 - x2), width - Math.abs(x1 - x2));
      const dy = Math.min(Math.abs(y1 - y2), height - Math.abs(y1 - y2));
      return Math.sqrt(dx * dx + dy * dy);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      background(5, 7, 10);
      resetWalkers();
    }
  </script>
</body>
</html>

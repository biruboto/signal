<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>convergent loom</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  html,body{margin:0;overflow:hidden;background:#080a0b;color:#d8d1bf;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
  canvas{display:block} #note{position:fixed;left:20px;bottom:17px;letter-spacing:.06em;line-height:1.55;pointer-events:none}
  #seed{position:fixed;right:20px;top:17px;text-align:right;letter-spacing:.05em;color:#aaa494;pointer-events:none}
</style>
</head>
<body>
<div id="seed"></div><div id="note">convergent loom<br><span id="caption"></span></div>
<script>
let fibers=[], knots=[], phase=0, choice=0;
const ratios=[(1+Math.sqrt(5))/2, Math.sqrt(2), Math.cbrt(2), Math.PI];
const names=['golden drift','square-root drift','cube-root drift','circular drift'];
function continued(x,n){let a=[]; for(let i=0;i<n;i++){let k=Math.floor(x);a.push(k); x=1/(x-k)} return a}
function convergents(a){let out=[], p0=1,p1=a[0],q0=0,q1=1;out.push([p1,q1]);for(let i=1;i<a.length;i++){let p=a[i]*p1+p0,q=a[i]*q1+q0;out.push([p,q]);p0=p1;p1=p;q0=q1;q1=q}return out}
function setup(){createCanvas(windowWidth,windowHeight); noFill(); build();}
function build(){
  let r=ratios[choice], cs=convergents(continued(r,11)); fibers=[];knots=[];
  for(let i=0;i<cs.length;i++){
    let [p,q]=cs[i], hue=(i*19+choice*31)%70;
    fibers.push({p,q,hue,offset:random(TWO_PI)});
    for(let j=0;j<min(q,34);j++) knots.push({x:(j*p%q)/q,y:(j/q),w:1+i*.42,h:hue,delay:random(1)});
  }
  document.getElementById('seed').textContent='ratio: '+names[choice]+'\n'+r.toFixed(9);
  document.getElementById('caption').textContent='threads are the best approximations available';
}
function draw(){
  background(8,10,11,42); phase+=.003;
  let margin=42, W=width-margin*2,H=height-margin*2;
  strokeWeight(1);
  for(let i=0;i<fibers.length;i++){
    let f=fibers[i]; stroke(110+f.hue,125+f.hue*.7,111+f.hue*.5,38);
    beginShape();
    let steps=80;
    for(let s=0;s<=steps;s++){
      let y=s/steps, wave=sin(TWO_PI*(f.p*y+phase)+f.offset)*(.7+4/(f.q+1));
      let x=((f.p*s)%f.q)/f.q + wave/W;
      vertex(margin+x*W,margin+y*H);
    }endShape();
  }
  noStroke();
  for(let k of knots){
    let pulse=.35+.65*sin(phase*8+k.delay*TWO_PI)*.5+.3;
    fill(205,190-k.h*.4,132+k.h,95*pulse);
    circle(margin+k.x*W,margin+k.y*H,k.w*(1+pulse));
  }
  stroke(215,205,170,32); line(margin,height-margin,width-margin,height-margin);
}
function mousePressed(){choice=(choice+1)%ratios.length; build();}
function windowResized(){resizeCanvas(windowWidth,windowHeight);build();}
</script>
</body>
</html>

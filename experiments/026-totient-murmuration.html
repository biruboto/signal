<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>totient murmuration</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #02040a; color: #e8f0ff; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    canvas { display: block; }
    #caption { position: fixed; left: 18px; bottom: 16px; max-width: 880px; color: rgba(232,240,255,.78); font-size: 12px; line-height: 1.45; letter-spacing: .02em; text-shadow: 0 1px 14px #000; }
    #caption b { color: #a8ffcf; font-weight: 500; }
  </style>
</head>
<body>
  <div id="caption"><b>totient murmuration</b> — each modulus releases only its coprime residues. the flock is the negative space between forbidden beats.</div>
  <script>
    const MODS = [17, 19, 23, 29, 31, 37, 41, 43];
    const RINGS = 15;
    const PARTICLES = 620;
    let agents = [];
    let residues = new Map();
    let t = 0;
    let caption;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(Math.min(2, window.devicePixelRatio || 1));
      colorMode(HSB, 360, 100, 100, 1);
      randomSeed(2607);
      noiseSeed(2607);
      caption = document.getElementById('caption');
      buildResidues();
      seedAgents();
      frameRate(30);
      background(224, 45, 3);
    }

    function buildResidues() {
      residues.clear();
      for (const m of MODS) {
        const open = [];
        for (let r = 1; r < m; r++) if (gcd(r, m) === 1) open.push(r);
        residues.set(m, open);
      }
    }

    function seedAgents() {
      agents = [];
      for (let i = 0; i < PARTICLES; i++) {
        const m = MODS[i % MODS.length];
        const open = residues.get(m);
        const r = open[(i * 7 + Math.floor(random(open.length))) % open.length];
        agents.push({
          m, r,
          ring: 1 + (i % RINGS),
          drift: random(TAU),
          memory: random(0.2, 1),
          hue: 135 + (m * 5 + r * 2) % 145,
          x: width / 2,
          y: height / 2,
          px: width / 2,
          py: height / 2
        });
      }
    }

    function draw() {
      noStroke();
      fill(224, 45, 3, 0.105);
      rect(0, 0, width, height);

      const cx = width * 0.5;
      const cy = height * 0.49;
      const span = min(width, height) * 0.45;
      let witnesses = 0;

      blendMode(ADD);
      for (const a of agents) {
        a.px = a.x; a.py = a.y;
        const gate = (t + a.r * a.r + a.ring * 3) % a.m;
        const open = gcd(gate || a.m, a.m) === 1;
        if (open) witnesses++;

        const phi = residues.get(a.m).length;
        const base = TAU * (a.r / a.m);
        const precession = t * (0.0019 + phi / (a.m * 900));
        const braid = sin(t * 0.012 + a.ring * 0.7 + a.drift) * 0.42;
        const radius = span * (0.10 + a.ring / (RINGS + 3)) * (0.86 + 0.12 * sin(t * 0.01 + a.m));
        const forbiddenPush = open ? 1 : -0.38;
        const murmur = noise(a.r * 0.05, a.ring * 0.17, t * 0.008) - 0.5;
        const angle = base + precession * forbiddenPush + braid + murmur * 0.9;
        const targetX = cx + cos(angle) * radius + cos(angle * 3 + t * 0.006) * span * 0.045;
        const targetY = cy + sin(angle) * radius * 0.72 + sin(angle * 2 - t * 0.007) * span * 0.05;

        a.memory = lerp(a.memory, open ? 1 : 0.18, 0.045);
        a.x = lerp(a.x, targetX, 0.12 + 0.05 * a.memory);
        a.y = lerp(a.y, targetY, 0.12 + 0.05 * a.memory);

        stroke(a.hue, 80, open ? 95 : 36, open ? 0.28 : 0.055);
        strokeWeight(open ? 1.15 + a.memory * 1.2 : 0.45);
        line(a.px, a.py, a.x, a.y);
        if (open && (t + a.r) % a.m === 0) {
          noStroke();
          fill(a.hue + 20, 72, 100, 0.16);
          circle(a.x, a.y, 2.2 + a.memory * 4.5);
        }
      }
      blendMode(BLEND);

      drawQuietRulers(cx, cy, span);
      if (t % 25 === 0) {
        const m = MODS[Math.floor((t / 25) % MODS.length)];
        const phi = residues.get(m).length;
        caption.innerHTML = `<b>totient murmuration</b> — modulus ${m} admits ${phi} coprime residues; ${witnesses} witnesses are open on this beat. the closed residues still steer the flock by absence.`;
      }
      t++;
    }

    function drawQuietRulers(cx, cy, span) {
      push();
      translate(cx, cy);
      noFill();
      strokeWeight(1);
      for (let i = 0; i < MODS.length; i++) {
        const m = MODS[i];
        const phi = residues.get(m).length;
        const r = span * (0.14 + i * 0.052);
        stroke(205, 35, 70, 0.025 + phi / (m * 44));
        ellipse(0, 0, r * 2, r * 1.44);
        for (let k = 0; k < m; k++) {
          if (k % 3 !== 0 && gcd(k || m, m) !== 1) continue;
          const a = TAU * k / m + t * 0.0009;
          const len = gcd(k || m, m) === 1 ? 6 : 2;
          stroke(gcd(k || m, m) === 1 ? 150 : 5, 55, 82, gcd(k || m, m) === 1 ? 0.12 : 0.05);
          line(cos(a) * (r - len), sin(a) * (r * 0.72 - len), cos(a) * (r + len), sin(a) * (r * 0.72 + len));
        }
      }
      pop();
    }

    function gcd(a, b) {
      a = Math.abs(a); b = Math.abs(b);
      while (b) { const n = a % b; a = b; b = n; }
      return a;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      for (const a of agents) { a.x = width / 2; a.y = height / 2; a.px = a.x; a.py = a.y; }
      background(224, 45, 3);
    }
  </script>
</body>
</html>

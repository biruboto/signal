<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>reciprocal silt</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #05040a; color: #ece8d6; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    canvas { display: block; }
    .readout {
      position: fixed; left: 18px; bottom: 16px; max-width: min(780px, calc(100vw - 36px));
      color: rgba(236,232,214,.76); font-size: 12px; line-height: 1.45; letter-spacing: .02em;
      text-shadow: 0 1px 16px rgba(0,0,0,.92); pointer-events: none;
    }
    .readout b { color: rgba(255,236,164,.96); font-weight: 500; }
    .readout .small { color: rgba(236,232,214,.46); }
  </style>
</head>
<body>
  <div id="caption" class="readout"></div>
  <script>
    let cell, cols, rows, silt, current, tick = 0, river = 0, modulus = 113;
    const caption = document.getElementById('caption');
    const moduli = [97, 101, 103, 107, 109, 113, 127, 131];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1);
      colorMode(HSB, 360, 100, 100, 1);
      noStroke();
      rebuild();
    }

    function rebuild() {
      cell = max(5, min(14, floor(min(windowWidth, windowHeight) / 82)));
      cols = ceil(width / cell);
      rows = ceil(height / cell);
      modulus = random(moduli);
      silt = new Float32Array(cols * rows);
      current = new Float32Array(cols * rows);
      river = floor(random(modulus));
      tick = 0;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const n = residue(x, y);
          const inv = inverse(n, modulus);
          const braid = inv ? (inv / modulus) : 0;
          const bank = abs(((x - cols / 2) * .73 + (y - rows / 2) * .41) % modulus) / modulus;
          const i = idx(x, y);
          current[i] = inv ? (sin((braid + bank) * TAU) * .5 + .5) : 0;
          silt[i] = inv ? .06 + .18 * noise(x * .07, y * .07) : .34;
        }
      }
    }

    function idx(x, y) { return ((y + rows) % rows) * cols + ((x + cols) % cols); }
    function residue(x, y) { return (x * 17 + y * 29 + 1) % modulus; }
    function inverse(a, m) {
      a = ((a % m) + m) % m;
      if (a === 0) return 0;
      let t = 0, nt = 1, r = m, nr = a;
      while (nr !== 0) {
        const q = floor(r / nr);
        [t, nt] = [nt, t - q * nt];
        [r, nr] = [nr, r - q * nr];
      }
      return r > 1 ? 0 : (t < 0 ? t + m : t);
    }

    function draw() {
      background(250, 44, 3.2, 0.24);
      tick++;
      river = (river + 1) % modulus;
      let deposits = 0, dry = 0, brightest = 0;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i = idx(x, y);
          const n = residue(x, y);
          const inv = inverse(n, modulus);
          const meeting = inv ? (n * river + inv + y) % modulus : 0;
          const pulse = meeting < 3 || abs(meeting - modulus) < 2;
          const neighborDebt = (current[idx(x + 1, y)] + current[idx(x - 1, y)] + current[idx(x, y + 1)] + current[idx(x, y - 1)]) * .25;
          current[i] = lerp(current[i], neighborDebt, .014) + (pulse ? .09 : 0) - .006;
          current[i] = constrain(current[i], 0, 1.8);
          silt[i] = constrain(silt[i] * .992 + current[i] * .018 + (pulse ? .08 : 0), 0, 1.25);

          if (!inv) dry++;
          if (pulse) deposits++;
          brightest = max(brightest, silt[i]);

          const v = silt[i];
          const hue = (38 + inv * 1.9 + 22 * noise(x * .035, y * .035, tick * .006)) % 360;
          const sat = inv ? 42 + v * 34 : 14;
          const bri = inv ? 7 + pow(v, .72) * 82 : 18 + 8 * sin(tick * .03 + x);
          fill(hue, sat, bri, .55 + min(.4, v * .35));
          rect(x * cell, y * cell, cell + .7, cell + .7);

          if (pulse && cell > 6) {
            fill(48, 22, 100, .8);
            circle(x * cell + cell * .5, y * cell + cell * .5, cell * (1.8 + noise(tick * .1, x, y)));
          }
        }
      }

      drawCurrents();
      caption.innerHTML = `<b>reciprocal silt</b> · modulus ${modulus}, river residue ${river}<br>` +
        `<span class="small">each cell sends n downstream and asks n⁻¹ where sediment should remember it; ${deposits} fresh deposits, ${dry} zero banks, max silt ${brightest.toFixed(2)}</span>`;
    }

    function drawCurrents() {
      blendMode(ADD);
      strokeWeight(max(1, cell * .12));
      for (let k = 0; k < 180; k++) {
        const seed = k * 997;
        let x = (noise(seed, tick * .002) * cols + tick * .018 + k * 7) % cols;
        let y = (noise(seed + 19, tick * .002) * rows + sin(tick * .006 + k) * 6 + rows) % rows;
        let px = x * cell, py = y * cell;
        stroke(44 + (k % 5) * 8, 28, 78, .045);
        noFill();
        beginShape();
        for (let j = 0; j < 9; j++) {
          const n = residue(floor(x), floor(y));
          const inv = inverse(n, modulus) || 1;
          const a = (inv / modulus) * TAU + noise(x * .05, y * .05, tick * .01) * 1.7;
          px = x * cell; py = y * cell;
          vertex(px, py);
          x += cos(a) * .9;
          y += sin(a) * .9;
          x = (x + cols) % cols; y = (y + rows) % rows;
        }
        endShape();
      }
      noStroke();
      blendMode(BLEND);
    }

    function mousePressed() { rebuild(); }
    function windowResized() { resizeCanvas(windowWidth, windowHeight); rebuild(); }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prime weather</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07080d; overflow: hidden; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    canvas { display: block; }
    .caption {
      position: fixed;
      left: 18px;
      bottom: 16px;
      color: rgba(220, 235, 255, 0.58);
      font-size: 12px;
      letter-spacing: 0.04em;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 18px rgba(90, 150, 255, 0.25);
    }
  </style>
</head>
<body>
  <div class="caption">prime weather · cells only exchange pressure on prime-numbered moments</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let cols, rows, cell;
    let field = [];
    let next = [];
    let primes = [];
    let t = 0;
    let seed;

    function isPrime(n) {
      if (n < 2) return false;
      if (n % 2 === 0) return n === 2;
      for (let i = 3; i * i <= n; i += 2) if (n % i === 0) return false;
      return true;
    }

    function rebuildPrimes(limit) {
      primes = [];
      for (let i = 2; i <= limit; i++) if (isPrime(i)) primes.push(i);
    }

    function ix(x, y) {
      return ((y + rows) % rows) * cols + ((x + cols) % cols);
    }

    function initialize() {
      cell = constrain(floor(min(width, height) / 52), 10, 18);
      cols = ceil(width / cell);
      rows = ceil(height / cell);
      field = new Array(cols * rows);
      next = new Array(cols * rows);
      rebuildPrimes(cols + rows + 200);
      noiseSeed(seed);

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const grain = noise(x * 0.075, y * 0.075, seed * 0.001);
          const diagonal = sin((x - y) * 0.21) * 0.16;
          field[ix(x, y)] = grain * 0.72 + diagonal + random(-0.08, 0.08);
        }
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1);
      colorMode(HSB, 360, 100, 100, 255);
      seed = floor(random(1e9));
      initialize();
      noStroke();
    }

    function draw() {
      t++;
      const primeMoment = isPrime(t);
      background(225, 38, 5, primeMoment ? 42 : 28);

      // Prime weather rule:
      // Ordinary time: pressure evaporates into local inertia.
      // Prime time: each cell borrows from two prime-offset neighbors,
      // creating long, irrational-looking fronts from a deterministic sieve.
      const pA = primes[t % primes.length];
      const pB = primes[(t * 7 + 11) % primes.length];
      const driftX = (pA % 11) - 5;
      const driftY = (pB % 13) - 6;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const here = field[ix(x, y)];
          const north = field[ix(x, y - 1)];
          const east = field[ix(x + 1, y)];
          const south = field[ix(x, y + 1)];
          const west = field[ix(x - 1, y)];
          let local = (north + east + south + west) * 0.25;

          if (primeMoment) {
            const farA = field[ix(x + driftX, y - driftY)];
            const farB = field[ix(x - (pB % 17), y + (pA % 19))];
            local = local * 0.48 + farA * 0.31 + farB * 0.21;
          }

          const tide = sin((x * pA + y * pB + t) * 0.012) * 0.018;
          const sharpen = primeMoment ? 1.025 : 0.992;
          next[ix(x, y)] = constrain((here * 0.67 + local * 0.33) * sharpen + tide, 0, 1);
        }
      }

      [field, next] = [next, field];

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const v = field[ix(x, y)];
          const e = abs(v - field[ix(x + 1, y)]) + abs(v - field[ix(x, y + 1)]);
          const rain = smoothstep(0.52, 0.86, v) * (primeMoment ? 1.15 : 0.85);
          const hue = lerp(205, 285, constrain(v + e * 1.8, 0, 1));
          const sat = 42 + e * 180;
          const bri = 7 + rain * 54 + e * 28;
          const alpha = 62 + rain * 120 + e * 250;
          fill(hue, sat, bri, alpha);

          const wobble = primeMoment ? sin((x + y + t) * 0.17) * 1.6 : 0;
          rect(x * cell + wobble, y * cell - wobble, cell + 0.8, cell + 0.8);

          if (primeMoment && e > 0.17) {
            fill(190, 18, 95, 90);
            circle(x * cell + cell * 0.5, y * cell + cell * 0.5, cell * constrain(e * 2.5, 0.4, 1.8));
          }
        }
      }

      if (primeMoment) drawPrimeGlyph(pA, pB);
    }

    function smoothstep(a, b, x) {
      const n = constrain((x - a) / (b - a), 0, 1);
      return n * n * (3 - 2 * n);
    }

    function drawPrimeGlyph(pA, pB) {
      push();
      translate(width - 82, 54);
      noFill();
      stroke(198, 32, 92, 120);
      strokeWeight(1);
      const r = 18 + (pA % 23);
      for (let i = 0; i < 5; i++) {
        rotate((pB % 17) * 0.01);
        ellipse(0, 0, r + i * 9, r * 0.72 + i * 6);
      }
      noStroke();
      fill(198, 20, 96, 150);
      textAlign(CENTER, CENTER);
      textSize(11);
      text(pA + ' / ' + pB, 0, 0);
      pop();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initialize();
    }
  </script>
</body>
</html>

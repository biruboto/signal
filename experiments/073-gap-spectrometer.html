<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gap spectrometer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; overflow: hidden; background: #070b0c; color: #c7d1c7; }
    canvas { display: block; }
    #caption { position: fixed; left: 22px; bottom: 18px; font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .08em; color: #9dac9d; pointer-events: none; }
    #caption b { color: #d9e5d8; font-weight: 500; }
    #hint { position: fixed; right: 22px; bottom: 18px; font: 10px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .07em; color: #607066; pointer-events: none; }
  </style>
</head>
<body>
  <div id="caption"><b>GAP SPECTROMETER</b><br>measuring the intervals an irrational rotation cannot avoid</div>
  <div id="hint">click: exchange the angle</div>
<script>
let theta, drift, tick = 0;
let palette = [
  [112, 205, 171], [222, 185, 99], [111, 154, 213], [205, 109, 139]
];
const angles = [(Math.sqrt(5)-1)/2, Math.sqrt(2)-1, Math.sqrt(3)-1, Math.PI-3];
let angleIndex = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  theta = angles[angleIndex];
  drift = random(1000);
  noStroke();
}

function draw() {
  background(7, 11, 12, 38);
  tick += 0.006;
  const margin = min(width, height) * 0.09;
  const cols = max(18, floor((width - margin * 2) / 19));
  const rows = max(10, floor((height - margin * 2) / 22));
  const phase = (tick * 0.17 + noise(drift, tick * 0.08) * 0.03) % 1;
  const bandY = height * 0.48 + sin(tick * 1.3) * height * 0.08;

  // A rotating cut: every cell asks when its orbit next crosses a thin interval.
  for (let r = 0; r < rows; r++) {
    let previous = -1;
    let shortGap = 0;
    for (let c = 0; c < cols; c++) {
      const n = r * cols + c;
      const orbit = (n * theta + phase + r * 0.00021) % 1;
      const aperture = 0.075 + 0.025 * sin(tick + r * 0.19);
      const hit = orbit < aperture || orbit > 1 - aperture * 0.36;
      const x = map(c, 0, cols - 1, margin, width - margin);
      const y = map(r, 0, rows - 1, margin, height - margin);

      if (hit) {
        const gap = previous < 0 ? 0 : c - previous;
        previous = c;
        if (gap > 0) shortGap = gap;
        const choice = (gap + r + floor(tick * 4)) % palette.length;
        const p = palette[choice];
        const brightness = gap === 0 ? 0.34 : map(constrain(gap, 1, 9), 1, 9, 0.45, 1);
        fill(p[0], p[1], p[2], 210 * brightness);
        const w = gap === 0 ? 2 : map(gap, 1, 9, 3, 12);
        rect(x - w / 2, y - 2, w, 4);
        if (gap > 0 && (r + c) % 3 === 0) {
          fill(p[0], p[1], p[2], 42);
          rect(x, y - min(40, gap * 6), 1, min(40, gap * 6));
        }
      } else if (shortGap > 0 && (c + r * 3) % 11 === 0) {
        fill(120, 145, 130, 15);
        rect(x, y, 1, 1);
      }
    }
  }

  // The slit itself: a drifting criterion crossing the measurement field.
  stroke(198, 220, 202, 38);
  strokeWeight(1);
  line(margin, bandY, width - margin, bandY);
  noStroke();
  fill(198, 220, 202, 100);
  for (let i = 0; i < 7; i++) {
    const x = margin + ((i * theta + phase) % 1) * (width - margin * 2);
    circle(x, bandY, 2.5);
  }

  fill(157, 175, 160, 110);
  textFont('monospace');
  textSize(10);
  text('angle ' + theta.toFixed(8) + '  /  window ' + (0.075 + 0.025 * sin(tick)).toFixed(4), 22, 22);
}

function mousePressed() {
  angleIndex = (angleIndex + 1) % angles.length;
  theta = angles[angleIndex];
  drift = random(1000);
  background(7, 11, 12);
}
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
